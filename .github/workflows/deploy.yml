# GitHub Actions 自动部署工作流
# 推送到 main 分支时自动构建并部署到 GitHub Pages
# 部署完成后通过 https://pc98.cc.cd 访问

name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: pc98-ui/package.json

      - name: Install dependencies
        run: cd pc98-ui && npm ci

      - name: Build
        run: cd pc98-ui && npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pc98-ui/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
